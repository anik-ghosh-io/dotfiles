[1440p+]
profile-restore=copy-equal
profile-cond=(height >= 1440)
profile=HighQuality
glsl-shaders-clr
glsl-shader="~~/shaders/SSim/SSimDownscaler.glsl"

[hd] # 720p/1080p
profile-restore=copy-equal
profile-cond=(height >= 720 and height < 1440)
profile=HighQuality
glsl-shaders-clr
glsl-shader="~~/shaders/SSim/SSSR+AdaptiveSharpening_Medium_Sharpening.glsl"
glsl-shader="~~/shaders/Chroma/CfL_Prediction.glsl"

[sdtv-ntsc] # SD sources
profile-restore=copy-equal
profile-cond=(height == 480 or height == 540 or height == 576)
profile=HighQuality
glsl-shaders-clr
glsl-shader="~~/shaders/Ani4Kv2 and AniSD/AniSD_ArtCNN_C4F32_i4.glsl"
glsl-shader="~~/shaders/Chroma/CfL_Prediction.glsl"

[HighQuality]
scale=spline36
scale-antiring=0.2
cscale=lanczos
dscale=catmull_rom
correct-downscaling=yes
linear-downscaling=yes
sigmoid-upscaling=yes
hdr-compute-peak=yes
hdr-peak-percentile=99.995
hdr-contrast-recovery=0.30
allow-delayed-peak-detect=yes

[Fast]
glsl-shaders-clr
scale=bilinear
cscale=bilinear
dscale=bilinear
correct-downscaling=no
linear-downscaling=no
sigmoid-upscaling=no
hdr-compute-peak=no
hdr-peak-percentile=100
hdr-contrast-recovery=0.0
allow-delayed-peak-detect=no
dither=no

[interpolation-activate]
profile-cond=get("interpolation")
profile-restore=copy
video-sync=display-resample

[extension.gif]
save-position-on-quit=no
loop-file=inf
no-cache

[pip]
ontop
on-all-workspaces
no-force-window-position
geometry=100%:100%
autofit=30%x30%

[pip-off]
no-ontop
no-on-all-workspaces
geometry=50%:50%
autofit=75%x75%

# This automatically downmix to stereo. Comment out or remove the profile-cond=... on both if you have a surround system to prevent automatic downmixing
[Downmix_Audio_5_1]
profile-restore=copy
profile-cond=(p["audio-params/channel-count"] == 6)
af=lavfi="lowpass=c=LFE:f=120,volume=1.6,pan=stereo|FL=0.5*FC+0.707*FL+0.707*BL+0.5*LFE|FR=0.5*FC+0.707*FR+0.707*BR+0.5*LFE"


[Downmix_Audio_7_1]
profile-restore=copy
profile-cond=(p["audio-params/channel-count"] == 8)
af=lavfi="lowpass=c=LFE:f=120,volume=1.6,pan=stereo|FL=0.5*FC+0.3*FLC+0.3*FL+0.3*BL+0.3*SL+0.5*LFE|FR=0.5*FC+0.3*FRC+0.3*FR+0.3*BR+0.3*SR+0.5*LFE"
