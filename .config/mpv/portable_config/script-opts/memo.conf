# Empty = in-memory only.
history_path=~~/memo-history.jsonl

entries=10
pagination=yes

hide_duplicates=yes
hide_deleted=yes
hide_same_dir=no

timestamp_format=%Y-%m-%d %H:%M:%S

use_titles=yes
truncate_titles=60

enabled=yes

# Fallback ASS menu keybinds.
up_binding=UP WHEEL_UP
down_binding=DOWN WHEEL_DOWN
select_binding=RIGHT ENTER
append_binding=Shift+RIGHT Shift+ENTER
close_binding=LEFT ESC

# Number of lines read from the end of the JSONL history file.
# 0 = read whole file.
max_scan_lines=5000

# Directory menu prefixes.
path_prefixes=pattern:.*
