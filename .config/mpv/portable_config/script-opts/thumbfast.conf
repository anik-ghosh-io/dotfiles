# Internal command-file base path.
# Leave empty for automatic temp path.
socket=

# Thumbnail base path.
# Leave empty for automatic temp path.
thumbnail=

max_height=320
max_width=320

# Display scale factor for overlay-add.
# Supports Fractional Scaling if needed.
scale_factor=1

# auto, no, none, clip, linear, gamma, reinhard, hable, mobius
tone_mapping=auto

overlay_id=42

# Start thumbnail worker immediately after file load.
spawn_first=no

# Quit worker after inactivity, seconds. 0 disables.
quit_after_inactivity=0

# Allow thumbnails for network playback.
network=no

# Allow album-art/audio thumbnails.
audio=no

# Hardware decoding in worker.
# For thumbnail generation, hwdec=no is often faster because frames need CPU readback.
# Try hwdec=yes for heavy 4K HEVC/AV1 files.
hwdec=no

# Kept for old config compatibility. Ignored by modern rewrite.
direct_io=no

# mpv executable path.
mpv_path=mpv

# Internal tuning.
# Lower values are more responsive but cost more CPU/filesystem polling.
file_check_interval=0.033333
seek_interval=0.05
child_poll_interval=0.016667

# Delay before exact refinement seek.
# Set to -1 to disable exact refinement and use fast/keyframe seeking only.
exact_seek_delay=0.25
