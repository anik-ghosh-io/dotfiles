# ytsub.conf

# Secondary/source subtitle language.
# Empty = disabled.
#
# Examples:
# source_lang=en
# source_lang=es
# source_lang=en,en-US,en-GB
source_lang=en

# Manual subtitle language picker.
# Empty = no default hotkey, but script-binding ytsub/load remains available.
load_autosub_binding=Alt+Y

# Auto-load original subtitle language.
# Empty = no default hotkey, but script-binding ytsub/auto remains available.
autoload_autosub_binding=Alt+y

# Automatically run auto mode after file load.
autoload_on_file_load=no
autoload_delay=0.35

# Cache directory.
cache_dir=~~/ytsub_cache_dir

# Legacy original-script workaround.
# Usually leave disabled.
filter_sub_single_line=no

# Try LuaSocket/LuaSec direct download first if available.
use_lua_http=yes

# Try curl direct download.
use_curl=yes
curl_path=curl

# If direct download fails, try yt-dlp subtitle download.
use_ytdlp_fallback=yes

# Empty = use mpv ytdl-hook path, then fallback to yt-dlp.
ytdlp_path=

# Generic extra yt-dlp arguments.
# Leave empty for generic config.
#
# Example only if you personally need browser cookies:
# ytdlp_extra_args=--cookies-from-browser chrome
ytdlp_extra_args=

# Direct URL fallback.
# Recommended: no
# YouTube timedtext direct URLs often fail with HTTP 429.
try_direct_url_fallback=no
direct_url_verify_delay=1.0

# Manual menu only shows subtitles with direct or derivable VTT URLs.
only_show_vtt_in_menu=yes

# Also include normal/manual subtitles from yt-dlp's subtitles field.
# Auto captions are still preferred for duplicate languages.
include_manual_subs=yes

# Network options.
user_agent=Mozilla/5.0
network_timeout=20
curl_retries=2
