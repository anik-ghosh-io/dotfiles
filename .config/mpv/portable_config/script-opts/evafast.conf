# How far to jump on press (in seconds).
# Set to 0 to disable tap-seeking and use pure hold-to-fast-forward.
seek_distance=5

# Playback speed modifier, applied once every speed_interval until cap is reached.
# Ramping up slightly slower than ramping down makes the acceleration feel deliberate
# and prevents immediate volume/audio pitch surges on brief accidental holds.
speed_increase=0.05
speed_decrease=0.10

# At what interval (in seconds) to apply speed modifiers.
# 0.05s (50ms) corresponds to 20 updates per second, which is highly responsive
# without causing excessive CPU usage.
speed_interval=0.05

# Playback speed cap.
# 2.0x is generally the limit for intelligible pitch-corrected audio, but can be
# increased if you are comfortable listening at higher speeds.
speed_cap=2.0

# Playback speed cap when subtitles are displayed.
# 1.5x is a standard limit for comfortable subtitle reading. Set to "no" to disable.
subs_speed_cap=1.5

# Multiply current speed by modifier before adjustment.
# Disabled by default for a predictable, linear increase.
multiply_modifier=no

# Show current speed on the OSD, or flash speed if using uosc.
show_speed=yes

# Show current speed on the OSD when toggled.
show_speed_toggled=yes

# Show current speed on the OSD when speeding up toward a target time.
show_speed_target=no

# Minimum time (in seconds) between speed OSD/uosc speed flashes.
# Throttling to 0.10s keeps the OSD updates legible and fluid without stutter.
speed_osd_interval=0.10

# Show seek actions on the OSD, or flash timeline if using uosc.
show_seek=yes

# Look ahead for smoother transition when subs_speed_cap is set.
# Now that we have fixed the cache desync, this can be set to "yes" to
# allow the player to start decelerating smoothly *before* a subtitle arrives.
lookahead=yes

# Minimum time (in seconds) between subtitle lookahead checks.
# 0.5s is highly recommended to save CPU while keeping lookahead accurate.
lookahead_cache_interval=0.5

# Restore your custom base playback speed when releasing the hold, instead of
# snapping back to 1.0x. Only matters if you play at a non-1.0x base speed;
# set to "no" if you'd rather every release reset straight to 1.0x.
restore_user_speed=yes
